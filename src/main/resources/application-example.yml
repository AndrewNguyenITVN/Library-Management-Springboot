spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/library_management
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL@gmail.com
    password: YOUR_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  # Base64-encoded secret key, độ dài tối thiểu 32 ký tự sau decode (256-bit cho HMAC-SHA256)
  accessTokenSecret: YOUR_BASE64_ACCESS_TOKEN_SECRET
  refreshTokenSecret: YOUR_BASE64_REFRESH_TOKEN_SECRET
  accessTokenExpiration: 900000        # 15 phút (ms)
  refreshTokenExpiration: 604800000    # 7 ngày (ms)

FileUpload:
  rootPath: /path/to/your/upload/folder
